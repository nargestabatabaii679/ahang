name: Deploy to Liara

on:
  push:
    branches: [main]
    paths:
      - "project-elevate/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ahang-songai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: project-elevate/package-lock.json

      - name: Install dependencies
        working-directory: project-elevate
        run: npm ci

      - name: Build app
        working-directory: project-elevate
        run: npm run build
        env:
          NITRO_PRESET: node-server

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./project-elevate
          file: ./project-elevate/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/ahang-songai:latest

      - name: Install Liara CLI
        run: npm install -g @liara/cli

      - name: Create Liara app via API (if not exists)
        run: |
          # Get Daneshavaran team ID
          TEAMS=$(curl -s "https://api.liara.ir/v1/teams" \
            -H "Authorization: Bearer ${{ secrets.LIARA_TOKEN }}")
          echo "Teams: $TEAMS"
          TEAM_ID=$(echo "$TEAMS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          teams = data.get('teams', data.get('data', data))
          if isinstance(teams, list):
              for t in teams:
                  name = t.get('name','') or t.get('title','')
                  if 'daneshavaran' in name.lower() or 'danes' in name.lower():
                      print(t.get('_id', t.get('id','')))
                      break
          " 2>/dev/null || echo "")
          echo "Team ID: $TEAM_ID"

          # Get network ID for koshtyiran-net (within team scope)
          if [ -n "$TEAM_ID" ]; then
            NETWORKS=$(curl -s "https://api.liara.ir/v1/networks?teamID=$TEAM_ID" \
              -H "Authorization: Bearer ${{ secrets.LIARA_TOKEN }}")
          else
            NETWORKS=$(curl -s "https://api.liara.ir/v1/networks" \
              -H "Authorization: Bearer ${{ secrets.LIARA_TOKEN }}")
          fi
          echo "Networks: $NETWORKS"
          NETWORK_ID=$(echo "$NETWORKS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          nets = data.get('networks', data.get('data', data))
          if isinstance(nets, list):
              for n in nets:
                  name = n.get('name','') or n.get('title','')
                  if 'koshtyiran' in name.lower() or 'kosht' in name.lower():
                      print(n.get('_id', n.get('id','')))
                      break
          " 2>/dev/null || echo "")
          echo "Network ID: $NETWORK_ID"

          # Build JSON payload
          PAYLOAD="{\"name\":\"songai\",\"planID\":\"small-g2\",\"bundlePlanID\":\"free\""
          if [ -n "$TEAM_ID" ]; then
            PAYLOAD="$PAYLOAD,\"teamID\":\"$TEAM_ID\""
          fi
          if [ -n "$NETWORK_ID" ]; then
            PAYLOAD="$PAYLOAD,\"network\":\"$NETWORK_ID\""
          fi
          PAYLOAD="$PAYLOAD}"
          echo "Payload: $PAYLOAD"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.liara.ir/v1/projects" \
            -H "Authorization: Bearer ${{ secrets.LIARA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "409" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "App creation returned unexpected code $HTTP_CODE, continuing anyway..."
          fi

          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV

      - name: Deploy image to Liara
        run: |
          EXTRA_ARGS=""
          if [ -n "$TEAM_ID" ]; then
            EXTRA_ARGS="--team-id $TEAM_ID"
          fi
          liara deploy \
            --app songai \
            --port 3000 \
            --image ghcr.io/${{ github.repository }}/ahang-songai:latest \
            --api-token ${{ secrets.LIARA_TOKEN }} \
            $EXTRA_ARGS
