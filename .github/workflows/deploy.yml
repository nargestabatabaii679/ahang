name: Deploy to Liara

on:
  push:
    branches: [main]
    paths:
      - "project-elevate/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ahang-songai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: project-elevate/package-lock.json

      - name: Install dependencies
        working-directory: project-elevate
        run: npm ci

      - name: Build app
        working-directory: project-elevate
        run: npm run build
        env:
          NITRO_PRESET: node-server

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./project-elevate
          file: ./project-elevate/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/ahang-songai:latest

      - name: Install Liara CLI
        run: npm install -g @liara/cli

      - name: Debug Liara disk commands
        run: |
          echo "=== Liara CLI version ==="
          liara --version
          echo "=== Disk help ==="
          liara disk --help 2>&1 || liara help disk 2>&1 || echo "No disk help found"
          echo "=== Try list disks ==="
          liara disk list --api-token ${{ secrets.LIARA_TOKEN }} --team-id 687f2bfec24fa7e8e27436cb 2>&1 || true
          echo "=== Try create disk ==="
          liara disk create songai-data --app songai --size 1 --api-token ${{ secrets.LIARA_TOKEN }} --team-id 687f2bfec24fa7e8e27436cb 2>&1 || true

      - name: Deploy image to Liara
        run: |
          liara deploy \
            --app songai \
            --port 3000 \
            --image ghcr.io/${{ github.repository }}/ahang-songai:latest \
            --api-token ${{ secrets.LIARA_TOKEN }} \
            --team-id 687f2bfec24fa7e8e27436cb
