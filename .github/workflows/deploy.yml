name: Deploy to Liara

on:
  push:
    branches: [main]
    paths:
      - "project-elevate/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ahang-songai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: project-elevate/package-lock.json

      - name: Install dependencies
        working-directory: project-elevate
        run: npm ci

      - name: Build app
        working-directory: project-elevate
        run: npm run build
        env:
          NITRO_PRESET: node-server

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./project-elevate
          file: ./project-elevate/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/ahang-songai:latest

      - name: Install Liara CLI
        run: npm install -g @liara/cli

      - name: Create Liara app via API (if not exists)
        run: |
          TEAM_NAME="DANESHAVARAN2"

          # Try to get team ID from different API endpoints
          TEAM_ID=$(curl -s "https://api.liara.ir/v2/teams" \
            -H "Authorization: Bearer ${{ secrets.LIARA_TOKEN }}" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              teams = data.get('teams', data.get('data', []))
              if isinstance(teams, list):
                  for t in teams:
                      name = (t.get('name','') or t.get('title','')).upper()
                      if 'DANESHAVARAN2' in name or 'DANESHAVARAN' in name:
                          print(t.get('_id', t.get('id','')))
                          break
          except: pass
          " 2>/dev/null || echo "")

          if [ -z "$TEAM_ID" ]; then
            TEAM_ID=$(curl -s "https://api.liara.ir/v1/me" \
              -H "Authorization: Bearer ${{ secrets.LIARA_TOKEN }}" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              teams = data.get('teams', data.get('user', {}).get('teams', []))
              if isinstance(teams, list):
                  for t in teams:
                      name = (t.get('name','') or t.get('title','')).upper()
                      if 'DANESHAVARAN' in name:
                          print(t.get('_id', t.get('id','')))
                          break
          except: pass
          " 2>/dev/null || echo "")
          fi

          echo "Team ID: $TEAM_ID"

          # Network ID (hardcoded from previous successful run)
          NETWORK_ID="6a118b8305caf38aface4a47"

          # Build payload
          PAYLOAD="{\"name\":\"songai\",\"planID\":\"small-g2\",\"bundlePlanID\":\"basic\""
          if [ -n "$TEAM_ID" ]; then
            PAYLOAD="$PAYLOAD,\"teamID\":\"$TEAM_ID\""
          fi
          PAYLOAD="$PAYLOAD,\"network\":\"$NETWORK_ID\"}"
          echo "Payload: $PAYLOAD"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.liara.ir/v1/projects" \
            -H "Authorization: Bearer ${{ secrets.LIARA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "409" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "App creation returned unexpected code $HTTP_CODE, continuing anyway..."
          fi

          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV

      - name: Deploy image to Liara
        run: |
          EXTRA_ARGS=""
          if [ -n "$TEAM_ID" ]; then
            EXTRA_ARGS="--team-id $TEAM_ID"
          fi
          liara deploy \
            --app songai \
            --port 3000 \
            --image ghcr.io/${{ github.repository }}/ahang-songai:latest \
            --api-token ${{ secrets.LIARA_TOKEN }} \
            $EXTRA_ARGS
