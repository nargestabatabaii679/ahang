name: Deploy to Liara

on:
  push:
    branches: [main]
    paths:
      - "project-elevate/**"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: project-elevate/package-lock.json

      - name: Install dependencies
        working-directory: project-elevate
        run: npm ci

      - name: Build app
        working-directory: project-elevate
        run: npm run build
        env:
          NITRO_PRESET: node-server

      - name: Install Liara CLI
        run: npm install -g @liara/cli

      - name: Create disks if not exist
        run: |
          liara disk create --name songai-data --app songai --size 1 --api-token ${{ secrets.LIARA_TOKEN }} --team-id 687f2bfec24fa7e8e27436cb 2>&1 || true
          liara disk create --name songai-media --app songai --size 1 --api-token ${{ secrets.LIARA_TOKEN }} --team-id 687f2bfec24fa7e8e27436cb 2>&1 || true

      - name: Deploy to Liara
        working-directory: project-elevate
        run: |
          liara deploy \
            --app songai \
            --port 3000 \
            --api-token ${{ secrets.LIARA_TOKEN }} \
            --team-id 687f2bfec24fa7e8e27436cb \
            --no-app-logs
